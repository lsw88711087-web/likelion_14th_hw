{% load static %}
<!-- 하나의 네비게이션 컨테이너에 양쪽 정렬(justify-content) 추가 -->
<nav class="navbar-container" style="justify-content: space-between;">
    
    <!-- 1. 좌측 영역: 기존 로고 + 기존 네비게이션 링크들 -->
    <div style="display: flex; gap: 20px; align-items: center;">
        <!-- 기존 로고 코드 살림 (크기만 제한) -->
        <img src="{% static 'images/lion.png' %}" alt="로고" class="logo" style="width: 40px;">
        
        <a class="navbar-link" href="{% url 'main:mainpage' %}">DGU_likelion_14th</a>
        <a class="navbar-link" href="{% url 'main:postpage' %}">게시판</a> <!-- nav에서 끌어올림 -->
        <a class="navbar-link" href="{% url 'main:tag_list' %}">태그</a>     <!-- nav에서 끌어올림 -->
        <a class="navbar-link" href="{% url 'main:secondpage' %}">Second Page</a>
    </div>

    <!-- 2. 우측 영역: 기존 header의 인증 로직 그대로 활용 -->
    <div class="header-right" style="display: flex; align-items: center; gap: 15px;">
        {% if user.is_authenticated %}
            <!-- 기존 인사말 코드 (주황 배경에 맞게 텍스트 색상만 하얀색으로 조정) -->
            <div style="color: white;">{{ user.username }}님 안녕하세요!</div>
            <div class="auth-links" style="display: flex; gap: 10px;">
                <a class="navbar-link" href="{% url 'accounts:logout' %}">로그아웃</a> 
                <a class="navbar-link" href="{% url 'users:mypage' request.user.id %}">마이페이지</a> 
            </div>
        {% else %}
            <!-- 기존 로그인/회원가입 코드 -->
            <div class="auth-links" style="display: flex; gap: 10px;">
                <a class="navbar-link" href="{% url 'accounts:login' %}">로그인</a>
                <a class="navbar-link" href="{% url 'accounts:signup' %}">회원가입</a>
            </div>
        {% endif %}
    </div>
</nav>
